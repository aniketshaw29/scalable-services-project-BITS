    container_name: notification-service
    ports:
      - "4076:4076"
    environment:
      DB_URL: jdbc:postgresql://notification-db:5432/notification_db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      EUREKA_URL: http://eureka-server:4070/eureka/
    depends_on:
      eureka-server:
        condition: service_healthy
      notification-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - campus-network

  certificate-service:
    build:
      context: ./certificate-service
    container_name: certificate-service
    ports:
      - "4077:4077"
    environment:
      DB_URL: jdbc:postgresql://certificate-db:5432/certificate_db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      EUREKA_URL: http://eureka-server:4070/eureka/
    depends_on:
      eureka-server:
        condition: service_healthy
      certificate-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - campus-network

  feedback-service:
    build:
      context: ./feedback-service
    container_name: feedback-service
    ports:
      - "4078:4078"
    environment:
      DB_URL: jdbc:postgresql://feedback-db:5432/feedback_db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      EUREKA_URL: http://eureka-server:4070/eureka/
    depends_on:
      eureka-server:
        condition: service_healthy
      feedback-db:
        condition: service_healthy
    networks:
      - campus-network

  leaderboard-service:
    build:
      context: ./leaderboard-service
    container_name: leaderboard-service
    ports:
      - "4079:4079"
    environment:
      DB_URL: jdbc:postgresql://leaderboard-db:5432/leaderboard_db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      EUREKA_URL: http://eureka-server:4070/eureka/
    depends_on:
      eureka-server:
        condition: service_healthy
      leaderboard-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - campus-network

  announcement-service:
    build:
      context: ./announcement-service
    container_name: announcement-service
    ports:
      - "4080:4080"
    environment:
      DB_URL: jdbc:postgresql://announcement-db:5432/announcement_db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
