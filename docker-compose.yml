      context: ./resource-service
    container_name: resource-service
    ports:
      - "4081:4081"
    environment:
      DB_URL: jdbc:postgresql://resource-db:5432/resource_db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      EUREKA_URL: http://eureka-server:4070/eureka/
      UPLOAD_DIR: /app/uploads
    volumes:
      - resource-uploads:/app/uploads
    depends_on:
      eureka-server:
        condition: service_healthy
      resource-db:
        condition: service_healthy
    networks:
      - campus-network

  sponsor-service:
