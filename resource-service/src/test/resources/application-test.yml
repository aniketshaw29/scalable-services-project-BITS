spring:
  datasource:
    url: jdbc:h2:mem:resource_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    show-sql: false
  h2:
    console:
      enabled: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

resource:
  upload-dir: ${java.io.tmpdir}/campus-eventhub-test-uploads
  max-file-size-mb: 10

eureka:
  client:
    enabled: false
