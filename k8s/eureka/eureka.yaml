apiVersion: apps/v1
kind: Deployment
metadata:
  name: eureka-server
  namespace: campus-eventhub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eureka-server
  template:
    metadata:
      labels:
        app: eureka-server
    spec:
      containers:
        - name: eureka-server
          image: campus-eventhub/eureka-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4070
          env:
            - name: SERVER_PORT
              value: "4070"
            - name: EUREKA_HOSTNAME
              valueFrom:
                configMapKeyRef:
                  name: campus-config
                  key: EUREKA_HOSTNAME
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 4070
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 4070
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 3
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: eureka-server
  namespace: campus-eventhub
spec:
  selector:
    app: eureka-server
  ports:
    - port: 4070
      targetPort: 4070
  type: ClusterIP
