apiVersion: apps/v1
kind: Deployment
metadata:
  name: resource-db
  namespace: campus-eventhub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: resource-db
  template:
    metadata:
      labels:
        app: resource-db
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: "resource_db"
            - name: POSTGRES_USER
              value: "postgres"
            - name: POSTGRES_PASSWORD
              value: "postgres"
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres", "-d", "resource_db"]
            initialDelaySeconds: 10
            periodSeconds: 5
          volumeMounts:
            - name: resource-db-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: resource-db-data
          persistentVolumeClaim:
            claimName: resource-db-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: resource-db-pvc
  namespace: campus-eventhub
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: resource-db
  namespace: campus-eventhub
spec:
  selector:
    app: resource-db
  ports:
    - port: 5432
      targetPort: 5432
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: resource-service
  namespace: campus-eventhub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: resource-service
  template:
    metadata:
      labels:
        app: resource-service
    spec:
      containers:
        - name: resource-service
          image: campus-eventhub/resource-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4081
          env:
            - name: DB_URL
              value: "jdbc:postgresql://resource-db:5432/resource_db"
            - name: DB_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: campus-config
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                configMapKeyRef:
                  name: campus-config
                  key: DB_PASSWORD
            - name: UPLOAD_DIR
              value: "/app/uploads"
            - name: EUREKA_URL
              valueFrom:
                configMapKeyRef:
                  name: campus-config
                  key: EUREKA_URL
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 4081
            initialDelaySeconds: 40
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 4081
            initialDelaySeconds: 80
            periodSeconds: 15
            failureThreshold: 3
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - name: resource-uploads
              mountPath: /app/uploads
      volumes:
        - name: resource-uploads
          persistentVolumeClaim:
            claimName: resource-uploads-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: resource-uploads-pvc
  namespace: campus-eventhub
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: resource-service
  namespace: campus-eventhub
spec:
  selector:
    app: resource-service
  ports:
    - port: 4081
      targetPort: 4081
  type: ClusterIP
