apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: campus-eventhub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: campus-eventhub/api-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4069
          env:
            - name: EUREKA_URL
              valueFrom:
                configMapKeyRef:
                  name: campus-config
                  key: EUREKA_URL
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 4069
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 4069
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 3
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: campus-eventhub
spec:
  selector:
    app: api-gateway
  ports:
    - port: 4069
      targetPort: 4069
      nodePort: 30069
  type: NodePort
