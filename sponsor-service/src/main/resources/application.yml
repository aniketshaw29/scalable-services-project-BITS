server:
  port: 4082

spring:
  application:
    name: sponsor-service
  datasource:
    url: jdbc:postgresql://localhost:5432/sponsor_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false

eureka:
  client:
    service-url:
      defaultZone: http://localhost:4070/eureka/
  instance:
    prefer-ip-address: true
